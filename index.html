<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo Card</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page-bg">
    <article data-testid="test-todo-card">

      <!-- WALLPAPER — sits behind everything -->
      <div class="card-wallpaper">
        <!-- Replace src with your image -->
        <img class="wallpaper-img" src="sandpaper.jpg" alt="Wallpaper" />
        <div class="wallpaper-placeholder">
          <i class="fa-solid fa-image"></i>
          <span>Wallpaper</span>
        </div>
      </div>

      <!-- MAIN CONTENT RECTANGLE — 15px radius, on top of wallpaper -->
      <div class="card-main">

        <!-- DATE BAR -->
        <div class="card-date-bar">
          <time id="current-date" data-testid="test-todo-current-date" datetime="">
            <i class="fa-regular fa-calendar"></i>
            <span id="current-date-text"></span>
          </time>
        </div>

        <!-- HEADER: Title + Checkbox -->
        <div class="card-header">
          <h2 id="task-title" data-testid="test-todo-title">Huddle with a Mentor</h2>
          <label class="checkbox-wrap">
            <input type="checkbox" id="complete-toggle" aria-label="Mark complete" />
            <span class="sr-only">Done</span>
          </label>
        </div>

        <!-- DUE ROW -->
        <div class="due-row">
          <time id="due-date" data-testid="test-todo-due-date">
            <i class="fa-regular fa-clock"></i>
            <span class="due-text">Due 4d</span>
          </time>
          <span id="priority-badge" class="due-pill priority-high" data-testid="test-todo-priority" aria-label="Priority: High">
            <i class="fa-solid fa-bolt"></i>
            <span id="priority-text">High</span>
          </span>
          <span id="task-status" class="due-pill status-inprogress" data-testid="test-todo-status" aria-label="Status: In Progress">
            <i class="fa-solid fa-circle-half-stroke"></i>
            <span id="status-text">In Progress</span>
          </span>
        </div>

        <!-- DESCRIPTION -->
        <p id="task-description" data-testid="test-todo-description">
          Join a mentor session and learn.
        </p>

        <!-- META: Priority icon, Status icon, divider, Tag icons -->
        <div class="meta-tags-row">
          <ul class="tags-list" data-testid="test-todo-tags" aria-label="Tags">
            <li class="tag-icon" title="Work">
              <i class="fa-solid fa-briefcase"></i>
            </li>
            <li class="tag-icon" title="Urgent">
              <i class="fa-solid fa-fire"></i>
            </li>
            <li class="tag-icon" title="Design">
              <i class="fa-solid fa-pen-ruler"></i>
            </li>
          </ul>
        </div>

        <!-- ACTIONS: Edit + Delete (icons only) -->
        <div class="actions">
          <button id="edit-btn" data-testid="test-todo-edit-button" aria-label="Edit task">
            <i class="fa-solid fa-pen"></i>
          </button>
          <button id="delete-btn" data-testid="test-todo-delete-button" aria-label="Delete task">
            <i class="fa-solid fa-trash"></i>
          </button>
        </div>

      </div>

      <!-- EDIT PANEL -->
      <div id="edit-panel" class="edit-panel" hidden>
        <div class="edit-panel-inner">
          <div class="edit-panel-heading">
            <i class="fa-solid fa-sliders"></i>
            Edit Task
          </div>
          <label class="edit-label">Title</label>
          <input id="edit-title-input" class="edit-input" type="text" />
          <label class="edit-label">Description</label>
          <textarea id="edit-desc-input" class="edit-textarea" rows="3"></textarea>
          <label class="edit-label">Priority</label>
          <select id="edit-priority-select" class="edit-select">
            <option value="low">Low</option>
            <option value="medium">Medium</option>
            <option value="high">High</option>
          </select>
          <label class="edit-label">Status</label>
          <select id="edit-status-select" class="edit-select">
            <option value="pending">Pending</option>
            <option value="inprogress">In Progress</option>
            <option value="done">Done</option>
          </select>
          <div class="edit-panel-actions">
            <button id="edit-save-btn" class="btn-save" aria-label="Save changes">
              <i class="fa-solid fa-check"></i>
            </button>
            <button id="edit-cancel-btn" class="btn-cancel" aria-label="Cancel edit">
              <i class="fa-solid fa-xmark"></i>
            </button>
          </div>
        </div>
      </div>

    </article>
  </div>
  <script src="scripts.js"></script>
</body>
</html>
