<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo Card</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page-bg">
    <article data-testid="test-todo-card">

      
      <div class="card-wallpaper">
        
        <img class="wallpaper-img" src="sandpaper.jpg" alt="Wallpaper" />
        <div class="wallpaper-placeholder">
          <i class="fa-solid fa-image"></i>
          <span>Wallpaper</span>
        </div>
      </div>

      
      <div class="card-main">

        
        <div class="card-date-bar">
          <time id="current-date" data-testid="test-todo-current-date" datetime="">
            <i class="fa-regular fa-calendar"></i>
            <span id="current-date-text"></span>
          </time>
        </div>

        
        <div class="card-header">
          <h2 id="task-title" data-testid="test-todo-title">Huddle with a Mentor</h2>
          <label class="checkbox-wrap">
            <input type="checkbox" id="complete-toggle" data-testid="test-todo-complete-toggle" aria-label="Mark complete" />
            <span class="sr-only">Done</span>
          </label>
        </div>

        
        <div class="due-row">
          <time id="due-date" data-testid="test-todo-due-date" datetime="2026-04-18T18:00:00Z">
            <i class="fa-regular fa-clock"></i>
            <span class="due-text">Due Apr 18, 2026</span>
          </time>
          <time id="time-remaining" data-testid="test-todo-time-remaining" aria-live="polite">
            <span id="time-remaining-text">Calculating...</span>
          </time>
          <span id="priority-badge" class="due-pill priority-high" data-testid="test-todo-priority" aria-label="Priority: High">
            <i class="fa-solid fa-bolt"></i>
            <span id="priority-text">High</span>
          </span>
          <span id="task-status" class="due-pill status-inprogress" data-testid="test-todo-status" aria-label="Status: In Progress">
            <i class="fa-solid fa-circle-half-stroke"></i>
            <span id="status-text">In Progress</span>
          </span>
        </div>

        
        <p id="task-description" data-testid="test-todo-description">
          Join a mentor session and learn.
        </p>

        
        <div class="meta-tags-row">
          <ul class="tags-list" data-testid="test-todo-tags" aria-label="Tags">
            <li class="tag-icon" title="Work" data-testid="test-todo-tag-work">
              <i class="fa-solid fa-briefcase"></i>
            </li>
            <li class="tag-icon" title="Urgent" data-testid="test-todo-tag-urgent">
              <i class="fa-solid fa-fire"></i>
            </li>
            <li class="tag-icon" title="Design">
              <i class="fa-solid fa-pen-ruler"></i>
            </li>
          </ul>
        </div>

        
        <div class="actions">
          <button id="edit-btn" data-testid="test-todo-edit-button" aria-label="Edit task">
            <i class="fa-solid fa-pen"></i>
          </button>
          <button id="delete-btn" data-testid="test-todo-delete-button" aria-label="Delete task">
            <i class="fa-solid fa-trash"></i>
          </button>
        </div>

      </div>

      
      <div id="edit-panel" class="edit-panel" hidden>
        <div class="edit-panel-inner">
          <div class="edit-panel-heading">
            <i class="fa-solid fa-sliders"></i>
            Edit Task
          </div>
          <label class="edit-label">Title</label>
          <input id="edit-title-input" class="edit-input" type="text" />
          <label class="edit-label">Description</label>
          <textarea id="edit-desc-input" class="edit-textarea" rows="3"></textarea>
          <label class="edit-label">Priority</label>
          <select id="edit-priority-select" class="edit-select">
            <option value="low">Low</option>
            <option value="medium">Medium</option>
            <option value="high">High</option>
          </select>
          <label class="edit-label">Status</label>
          <select id="edit-status-select" class="edit-select">
            <option value="pending">Pending</option>
            <option value="inprogress">In Progress</option>
            <option value="done">Done</option>
          </select>
          <div class="edit-panel-actions">
            <button id="edit-save-btn" class="btn-save" aria-label="Save changes">
              <i class="fa-solid fa-check"></i>
            </button>
            <button id="edit-cancel-btn" class="btn-cancel" aria-label="Cancel edit">
              <i class="fa-solid fa-xmark"></i>
            </button>
          </div>
        </div>
      </div>

      
      <div id="delete-modal" class="delete-modal" hidden>
        <div class="delete-modal-card" role="dialog" aria-modal="true" aria-labelledby="delete-modal-title">
          <h3 id="delete-modal-title">Delete task?</h3>
          <p>This action cannot be undone.</p>
          <div class="delete-modal-actions">
            <button id="delete-cancel-btn" class="delete-cancel-btn" type="button">Cancel</button>
            <button id="delete-confirm-btn" class="delete-confirm-btn" type="button">OK</button>
          </div>
        </div>
      </div>

    </article>
  </div>
  <script src="scripts.js"></script>
</body>
</html>
